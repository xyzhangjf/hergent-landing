# Hergent API — Nginx 反向代理配置
# 用法: cp nginx-Hergent.conf /etc/nginx/sites-available/Hergent
#       ln -s /etc/nginx/sites-available/Hergent /etc/nginx/sites-enabled/
#       certbot --nginx -d api.hergent.io
#       nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name api.hergent.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.hergent.io;

    ssl_certificate     /etc/letsencrypt/live/api.hergent.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hergent.io/privkey.pem;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 流式请求需要关闭缓冲
    proxy_buffering off;
    proxy_cache off;

    # 超时（AI 调用可能较慢）
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大请求体（文件上传代理）
        client_max_body_size 50m;
    }
}
