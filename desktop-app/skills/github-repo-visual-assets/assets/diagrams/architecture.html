<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Diagram</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .diagram {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
        }
        h1 {
            color: #2d3748;
            margin: 0 0 30px 0;
            font-size: 32px;
        }
        .component {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
        }
        .component h2 {
            color: #4a5568;
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        .component p {
            color: #718096;
            margin: 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <h1>🏗️ Architecture Diagram Template</h1>
        <div class="component">
            <h2>Frontend Layer</h2>
            <p>User interface and client-side logic</p>
        </div>
        <div class="component">
            <h2>API Layer</h2>
            <p>RESTful API endpoints and business logic</p>
        </div>
        <div class="component">
            <h2>Data Layer</h2>
            <p>Database and data persistence</p>
        </div>
    </div>
</body>
</html>
