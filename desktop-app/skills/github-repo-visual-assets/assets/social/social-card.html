<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Social Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1200px;
            height: 630px;
        }
        .card {
            text-align: center;
            color: white;
            padding: 80px;
        }
        h1 {
            font-size: 64px;
            margin: 0 0 20px 0;
            font-weight: 700;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        p {
            font-size: 32px;
            margin: 0 0 40px 0;
            opacity: 0.9;
            font-weight: 300;
        }
        .meta {
            font-size: 24px;
            opacity: 0.8;
        }
        .emoji {
            font-size: 120px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🚀</div>
        <h1>Project Name</h1>
        <p>Your awesome project description</p>
        <div class="meta">github.com/username/repo</div>
    </div>
</body>
</html>
