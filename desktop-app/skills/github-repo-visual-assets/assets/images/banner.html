<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Banner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
        }
        .banner {
            text-align: center;
            color: white;
            padding: 60px;
        }
        h1 {
            font-size: 72px;
            margin: 0 0 20px 0;
            font-weight: 700;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        p {
            font-size: 28px;
            margin: 0;
            opacity: 0.9;
            font-weight: 300;
        }
        .emoji {
            font-size: 96px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="emoji">🚀</div>
        <h1>Project Name</h1>
        <p>Your awesome project description</p>
    </div>
</body>
</html>
