<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Central mark: stylized H + wing + bolt -->
  <g transform="translate(512,460)" fill="none" stroke="#ffffff" stroke-width="64" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left wing -->
    <path d="M-200,140 C-180,60 -100,-160 0,-200 C-60,-120 -100,-20 -100,140" opacity="0.9"/>
    <!-- Right wing -->
    <path d="M200,140 C180,60 100,-160 0,-200 C60,-120 100,-20 100,140" opacity="0.9"/>
    <!-- Center bolt -->
    <polygon points="-36,-80 0,-160 36,-80 0,-10" opacity="0.95"/>
    <!-- Horizontal bar -->
    <line x1="-80" y1="180" x2="80" y2="180" opacity="0.7"/>
  </g>

  <!-- Subtle glow ring -->
  <circle cx="512" cy="460" r="280" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.12"/>
</svg>
