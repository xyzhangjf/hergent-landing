<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg3)"/>

  <!-- Network / AI nodes -->
  <g transform="translate(512,460)" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Connecting lines -->
    <line x1="-160" y1="-200" x2="-60" y2="-120" opacity="0.25"/>
    <line x1="160" y1="-200" x2="60" y2="-120" opacity="0.25"/>
    <line x1="-160" y1="200" x2="-60" y2="120" opacity="0.25"/>
    <line x1="160" y1="200" x2="60" y2="120" opacity="0.25"/>
    <line x1="-60" y1="-120" x2="60" y2="-120" opacity="0.25"/>
    <line x1="-60" y1="120" x2="60" y2="120" opacity="0.25"/>
    <line x1="-60" y1="-120" x2="-60" y2="120" opacity="0.25"/>
    <line x1="60" y1="-120" x2="60" y2="120" opacity="0.25"/>

    <!-- Center diamond -->
    <polygon points="0,-220 80,0 0,220 -80,0" fill="#ffffff" opacity="0.95" stroke="none"/>
    <!-- Inner cutout -->
    <polygon points="0,-160 54,0 0,160 -54,0" fill="#0891b2" stroke="none"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="none"/>

    <!-- Outer nodes -->
    <circle cx="-160" cy="-200" r="16" fill="#ffffff" stroke="none" opacity="0.5"/>
    <circle cx="160" cy="-200" r="16" fill="#ffffff" stroke="none" opacity="0.5"/>
    <circle cx="-160" cy="200" r="16" fill="#ffffff" stroke="none" opacity="0.5"/>
    <circle cx="160" cy="200" r="16" fill="#ffffff" stroke="none" opacity="0.5"/>
  </g>
</svg>
