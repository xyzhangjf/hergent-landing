<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="cyan5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#06b6d4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- White squircle -->
  <rect width="1024" height="1024" rx="224" fill="#ffffff"/>

  <!-- H logo with shadow -->
  <g transform="translate(512,490)" filter="url(#shadow)">
    <!-- Left pillar -->
    <rect x="-200" y="-220" width="72" height="440" rx="36" fill="url(#cyan5)"/>
    <!-- Right pillar -->
    <rect x="128" y="-220" width="72" height="440" rx="36" fill="url(#cyan5)"/>
    <!-- Cross bar -->
    <rect x="-200" y="-36" width="400" height="72" rx="36" fill="url(#cyan5)"/>
  </g>
</svg>
