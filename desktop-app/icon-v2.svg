<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1020"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Dark squircle background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg2)"/>

  <!-- Abstract H logo -->
  <g transform="translate(512,512)">
    <!-- Left pillar -->
    <rect x="-200" y="-220" width="72" height="440" rx="36" fill="#06b6d4"/>
    <!-- Right pillar -->
    <rect x="128" y="-220" width="72" height="440" rx="36" fill="#06b6d4"/>
    <!-- Cross bar - gradient -->
    <defs>
      <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#06b6d4"/>
        <stop offset="100%" stop-color="#22d3ee"/>
      </linearGradient>
    </defs>
    <rect x="-200" y="-36" width="400" height="72" rx="36" fill="url(#bar)"/>

  </g>
</svg>
