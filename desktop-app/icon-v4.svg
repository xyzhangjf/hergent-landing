<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- White squircle background -->
  <rect width="1024" height="1024" rx="224" fill="#ffffff"/>

  <!-- Subtle border -->
  <rect width="1024" height="1024" rx="224" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- H logo -->
  <g transform="translate(512,512)">
    <!-- Left pillar -->
    <rect x="-220" y="-240" width="80" height="480" rx="40" fill="url(#cyanGrad)"/>
    <!-- Right pillar -->
    <rect x="140" y="-240" width="80" height="480" rx="40" fill="url(#cyanGrad)"/>
    <!-- Cross bar -->
    <rect x="-220" y="-40" width="440" height="80" rx="40" fill="url(#cyanGrad)"/>
  </g>
</svg>
